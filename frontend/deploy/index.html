<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Atlas</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #0b0d10;
    --fg: #e7eaee;
    --muted: #8a94a0;
    --card: #14181d;
    --card-hover: #1a2028;
    --accent: #6aa6ff;
    --border: #252c35;
  }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); }
  body {
    font: 16px/1.5 ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 2rem;
    box-sizing: border-box;
  }
  main { width: 100%; max-width: 640px; }
  h1 { font-size: 2rem; margin: 0 0 0.25rem; letter-spacing: -0.01em; }
  p.lede { margin: 0 0 2rem; color: var(--muted); }
  ul { list-style: none; padding: 0; margin: 0; display: grid; gap: 0.75rem; }
  a.card {
    display: block;
    padding: 1rem 1.25rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: inherit;
    text-decoration: none;
    transition: background 120ms ease, border-color 120ms ease;
  }
  a.card:hover, a.card:focus-visible {
    background: var(--card-hover);
    border-color: var(--accent);
    outline: none;
  }
  a.card strong { display: block; font-size: 1.05rem; margin-bottom: 0.15rem; }
  a.card span { color: var(--muted); font-size: 0.9rem; }
  footer { margin-top: 2rem; color: var(--muted); font-size: 0.85rem; }
  footer a { color: var(--muted); }
</style>
</head>
<body>
<main>
  <h1>Atlas</h1>
  <p class="lede">Frontend apps deployed from <code>main</code>.</p>
  <ul>
    <li><a class="card" href="./admin/">
      <strong>Admin</strong>
      <span>Tenant administration console.</span>
    </a></li>
    <li><a class="card" href="./sandbox/">
      <strong>Sandbox</strong>
      <span>Design system &amp; component playground.</span>
    </a></li>
  </ul>
  <footer><a href="https://github.com/BriceKrispies/atlas">github.com/BriceKrispies/atlas</a></footer>
</main>
</body>
</html>
