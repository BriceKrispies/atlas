<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Atlas Admin</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: var(--atlas-font-family, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif); }
    </style>
  </head>
  <body>
    <admin-shell>
      <pages-list-page data-route="content"></pages-list-page>
      <atlas-box data-route="badges"><atlas-heading level="1">Badges</atlas-heading><atlas-text variant="muted">Coming soon.</atlas-text></atlas-box>
      <atlas-box data-route="points"><atlas-heading level="1">Points</atlas-heading><atlas-text variant="muted">Coming soon.</atlas-text></atlas-box>
      <atlas-box data-route="org"><atlas-heading level="1">Org</atlas-heading><atlas-text variant="muted">Coming soon.</atlas-text></atlas-box>
      <atlas-box data-route="comms"><atlas-heading level="1">Comms</atlas-heading><atlas-text variant="muted">Coming soon.</atlas-text></atlas-box>
      <atlas-box data-route="tokens"><atlas-heading level="1">Tokens</atlas-heading><atlas-text variant="muted">Coming soon.</atlas-text></atlas-box>
      <atlas-box data-route="import"><atlas-heading level="1">Import</atlas-heading><atlas-text variant="muted">Coming soon.</atlas-text></atlas-box>
      <atlas-box data-route="audit"><atlas-heading level="1">Audit</atlas-heading><atlas-text variant="muted">Coming soon.</atlas-text></atlas-box>
    </admin-shell>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
