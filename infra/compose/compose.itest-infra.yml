# Hybrid integration-test infrastructure: Postgres + Keycloak only.
# The Atlas Rust services (control-plane, ingress, workers) run as host
# processes via `atlas itest up`, not as containers. This avoids the
# fragile Windows -> WSL2 buildah tar transfer that breaks the full
# docker-compose.itest.yml build path on dev machines.
#
# Required env vars (injected by `atlas itest up`):
#   POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB, POSTGRES_PORT
#   KEYCLOAK_ADMIN, KEYCLOAK_ADMIN_PASSWORD, KEYCLOAK_PORT

services:
  postgres:
    image: postgres:16-alpine
    container_name: atlas-itest-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - atlas-itest-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - atlas-itest-network
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: atlas-itest-keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: ${KEYCLOAK_PORT:-8081}
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
    ports:
      - "${KEYCLOAK_PORT:-8081}:8080"
    volumes:
      - atlas-itest-keycloak-data:/opt/keycloak/data
      - ./config/keycloak/atlas-realm.json:/opt/keycloak/data/import/atlas-realm.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000; echo -e 'GET /health/ready HTTP/1.1\\r\\nhost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3; cat <&3 | grep -q '200 OK'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - atlas-itest-network
    restart: unless-stopped

networks:
  atlas-itest-network:
    name: atlas-itest-network
    driver: bridge

volumes:
  atlas-itest-postgres-data:
  atlas-itest-keycloak-data:
