services:
  # ============================================================================
  # Infrastructure Services
  # ============================================================================

  postgres:
    image: postgres:16-alpine
    container_name: atlas-itest-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - atlas-itest-postgres-data:/var/lib/postgresql/data
      - ./config/pg_hba.conf:/etc/postgresql/pg_hba.conf
      - ./postgres-fatal-monitor.sh:/usr/local/bin/postgres-fatal-monitor.sh:ro
    entrypoint: ["/bin/sh", "/usr/local/bin/postgres-fatal-monitor.sh"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - atlas-itest-network
    restart: unless-stopped

  keycloak:
    # Pinned to 25.0 for reproducible itest stack — see infra/compose/keycloak/README.md.
    image: quay.io/keycloak/keycloak:25.0
    container_name: atlas-itest-keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      # Hostname configuration for consistent issuer URLs
      # Internal: http://keycloak:8080/realms/atlas (used by ingress)
      # External: http://localhost:8081/realms/atlas (used by tests)
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8081
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
    ports:
      - "${KEYCLOAK_PORT}:8080"
    volumes:
      - atlas-itest-keycloak-data:/opt/keycloak/data
      - ./config/keycloak/atlas-realm.json:/opt/keycloak/data/import/atlas-realm.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000; echo -e 'GET /health/ready HTTP/1.1\\r\\nhost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3; cat <&3 | grep -q '200 OK'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - atlas-itest-network
    restart: unless-stopped

  # ============================================================================
  # Database Migration & Seeding (One-shot services)
  # ============================================================================

  migrate:
    image: rust:latest
    container_name: atlas-itest-migrate
    working_dir: /workspace
    volumes:
      - ../../:/workspace
    environment:
      DATABASE_URL: ${CONTROL_PLANE_DB_URL}
      CONTROL_PLANE_DB_URL: ${CONTROL_PLANE_DB_URL}
    command: >
      bash -c "
        cd crates/control_plane_db &&
        cargo run --bin migrate
      "
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - atlas-itest-network
    restart: on-failure

  seed:
    image: rust:latest
    container_name: atlas-itest-seed
    working_dir: /workspace
    volumes:
      - ../../:/workspace
    environment:
      DATABASE_URL: ${CONTROL_PLANE_DB_URL}
      CONTROL_PLANE_DB_URL: ${CONTROL_PLANE_DB_URL}
    command: >
      bash -c "
        cd crates/control_plane_db &&
        cargo run --bin seed
      "
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    networks:
      - atlas-itest-network
    restart: on-failure

  # ============================================================================
  # Application Services
  # ============================================================================

  control-plane:
    # Image built by: docker buildx bake -f docker-bake.itest.hcl
    image: atlas-platform-control-plane:itest
    container_name: atlas-itest-control-plane
    environment:
      PORT: ${CONTROL_PLANE_PORT}
      DATABASE_URL: ${CONTROL_PLANE_DB_URL}
      CONTROL_PLANE_DB_URL: ${CONTROL_PLANE_DB_URL}
      RUST_LOG: ${RUST_LOG}
    ports:
      - "${CONTROL_PLANE_PORT}:${CONTROL_PLANE_PORT}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${CONTROL_PLANE_PORT}/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    depends_on:
      seed:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    networks:
      - atlas-itest-network
    restart: unless-stopped

  ingress:
    # Image built by: docker buildx bake -f docker-bake.itest.hcl
    # (includes test-auth feature via CARGO_FEATURES_INGRESS variable)
    image: atlas-platform-ingress:itest
    container_name: atlas-itest-ingress
    environment:
      ATLAS_ENV: ${ATLAS_ENV}
      CONTROL_PLANE_ENABLED: ${CONTROL_PLANE_ENABLED}
      CONTROL_PLANE_DB_URL: ${CONTROL_PLANE_DB_URL}
      TENANT_ID: ${TENANT_ID}
      RUST_LOG: ${RUST_LOG}
      METRICS_ADDR: ${METRICS_ADDR}
      # Enable test auth mode for X-Debug-Principal header
      TEST_AUTH_ENABLED: "true"
      # Enable /debug/whoami endpoint for authentication blackbox tests
      DEBUG_AUTH_ENDPOINT_ENABLED: "true"
      # OIDC configuration for JWT validation
      # Issuer URL must match the 'iss' claim in tokens from Keycloak
      OIDC_ISSUER_URL: http://localhost:8081/realms/atlas
      # JWKS URL for fetching public keys (internal Docker network)
      OIDC_JWKS_URL: http://keycloak:8080/realms/atlas/protocol/openid-connect/certs
      # Expected audience in tokens
      OIDC_AUDIENCE: account
    ports:
      - "${INGRESS_PORT}:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    depends_on:
      control-plane:
        condition: service_healthy
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - atlas-itest-network
    restart: unless-stopped

  workers:
    # Image built by: docker buildx bake -f docker-bake.itest.hcl
    image: atlas-platform-workers:itest
    container_name: atlas-itest-workers
    environment:
      ATLAS_ENV: ${ATLAS_ENV}
      CONTROL_PLANE_ENABLED: ${CONTROL_PLANE_ENABLED}
      CONTROL_PLANE_DB_URL: ${CONTROL_PLANE_DB_URL}
      TENANT_ID: ${TENANT_ID}
      RUST_LOG: ${RUST_LOG}
    ports:
      - "${WORKERS_METRICS_PORT}:9101"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9101/metrics"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    depends_on:
      control-plane:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - atlas-itest-network
    restart: unless-stopped

  # ============================================================================
  # Observability Stack
  # ============================================================================

  prometheus:
    image: prom/prometheus:latest
    container_name: atlas-itest-prometheus
    profiles: ["obs"]
    ports:
      - "${PROMETHEUS_PORT}:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - atlas-itest-prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - atlas-itest-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: atlas-itest-grafana
    profiles: ["obs"]
    ports:
      - "${GRAFANA_PORT}:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    volumes:
      - atlas-itest-grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning/datasources/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./config/grafana/provisioning/dashboards/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
    networks:
      - atlas-itest-network
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: atlas-itest-loki
    profiles: ["obs"]
    ports:
      - "${LOKI_PORT}:3100"
    volumes:
      - ./config/loki-config.yml:/etc/loki/local-config.yaml:ro
      - atlas-itest-loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - atlas-itest-network
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    container_name: atlas-itest-promtail
    profiles: ["obs"]
    volumes:
      - ./config/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - atlas-itest-network
    restart: unless-stopped

  # ============================================================================
  # Ops UI Dashboard
  # ============================================================================

  dozzle:
    image: amir20/dozzle:latest
    container_name: atlas-itest-dozzle
    ports:
      - "${DOZZLE_PORT}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      DOZZLE_LEVEL: info
      DOZZLE_TAILSIZE: 300
      DOZZLE_FILTER: "name=atlas-itest-*"
    networks:
      - atlas-itest-network
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: atlas-itest-pgadmin
    profiles: ["obs"]
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    ports:
      - "${PGADMIN_PORT}:80"
    volumes:
      - atlas-itest-pgadmin-data:/var/lib/pgadmin
      - ./config/pgadmin-servers.json:/pgadmin4/servers.json:ro
    networks:
      - atlas-itest-network
    restart: unless-stopped

# ============================================================================
# Networks
# ============================================================================

networks:
  atlas-itest-network:
    driver: bridge
    name: atlas-itest-network

# ============================================================================
# Volumes
# ============================================================================

volumes:
  atlas-itest-postgres-data:
    name: atlas-itest-postgres-data
  atlas-itest-keycloak-data:
    name: atlas-itest-keycloak-data
  atlas-itest-grafana-data:
    name: atlas-itest-grafana-data
  atlas-itest-prometheus-data:
    name: atlas-itest-prometheus-data
  atlas-itest-loki-data:
    name: atlas-itest-loki-data
  atlas-itest-pgadmin-data:
    name: atlas-itest-pgadmin-data
