# Control Plane Database - Postgres + pgAdmin
# Compatible with both podman-compose (default) and docker-compose
#
# IMPORTANT: This compose file requires environment variables to be set.
# Use the Atlas CLI (`atlas dev up`) which injects all required variables,
# or set them manually in your shell before running docker-compose.
#
# Required environment variables:
#   POSTGRES_DB, POSTGRES_USER, POSTGRES_PASSWORD
#   CONTROL_PLANE_DB_URL
#
# Usage:
#   atlas dev up              # Recommended - CLI handles all configuration
#   make db-up                # Uses docker-compose with env vars from CLI
#
# Access:
#   Postgres: localhost:5433
#   pgAdmin:  http://localhost:5050

services:
  postgres:
    image: postgres:16-alpine
    container_name: atlas-platform-control-plane-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST_AUTH_METHOD: md5
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - control_plane_network

  migrate:
    image: rust:latest
    container_name: atlas-platform-migrate
    working_dir: /workspace
    volumes:
      - ../../:/workspace
    environment:
      CONTROL_PLANE_DB_URL: ${CONTROL_PLANE_DB_URL}
    command: >
      bash -c "
      cargo run -p atlas-platform-control-plane-db --bin migrate
      "
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - control_plane_network
    profiles:
      - tools

  seed:
    image: rust:latest
    container_name: atlas-platform-seed
    working_dir: /workspace
    volumes:
      - ../../:/workspace
    environment:
      CONTROL_PLANE_DB_URL: ${CONTROL_PLANE_DB_URL}
    command: >
      bash -c "
      cargo run -p atlas-platform-control-plane-db --bin seed
      "
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - control_plane_network
    profiles:
      - tools

  control-plane:
    build:
      context: ../../
      dockerfile: apps/control-plane/Dockerfile
    container_name: atlas-platform-control-plane
    environment:
      ATLAS_ENV: ${ATLAS_ENV:-strict}
      CONTROL_PLANE_DB_URL: ${CONTROL_PLANE_DB_URL}
      PORT: 8000
      RUST_LOG: ${RUST_LOG:-info}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - control_plane_network
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: atlas-platform-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin-servers.json:/pgadmin4/servers.json:ro
    depends_on:
      - postgres
    networks:
      - control_plane_network
    restart: unless-stopped
    profiles:
      - tools

networks:
  control_plane_network:
    driver: bridge

volumes:
  postgres_data:
  pgadmin_data:
