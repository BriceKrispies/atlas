global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'atlas-platform-local'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Local development (services running on host)
  - job_name: 'ingress'
    static_configs:
      - targets: ['host.docker.internal:3000']
    metrics_path: '/metrics'
    scrape_interval: 5s

  - job_name: 'workers'
    static_configs:
      - targets: ['host.docker.internal:9101']
    metrics_path: '/metrics'
    scrape_interval: 5s

  # Integration test stack (containerized services)
  - job_name: 'ingress-itest'
    static_configs:
      - targets: ['atlas-itest-ingress:3000']
    metrics_path: '/metrics'
    scrape_interval: 5s

  - job_name: 'workers-itest'
    static_configs:
      - targets: ['atlas-itest-workers:9101']
    metrics_path: '/metrics'
    scrape_interval: 5s
