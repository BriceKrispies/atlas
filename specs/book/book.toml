[book]
title = "Atlas Platform Specifications"
authors = ["Atlas Team"]
language = "en"
src = "."

[build]
build-dir = "book"

[output.html]
default-theme = "light"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/BriceKrispies/atlas"
edit-url-template = "https://github.com/BriceKrispies/atlas/edit/main/specs/{path}"

[output.html.fold]
enable = true
level = 1
