name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Build admin
        env:
          VITE_BASE: /atlas/admin/
        run: pnpm --filter @atlas/admin build

      - name: Build sandbox
        env:
          VITE_BASE: /atlas/sandbox/
        run: pnpm --filter @atlas/sandbox build

      - name: Build authoring
        env:
          VITE_BASE: /atlas/authoring/
        run: pnpm --filter @atlas/authoring build

      - name: Assemble site
        run: |
          mkdir -p site/admin site/sandbox site/authoring
          cp deploy/index.html site/index.html
          cp deploy/index.html site/404.html
          cp -r dist/admin/. site/admin/
          cp -r dist/sandbox/. site/sandbox/
          cp -r dist/authoring/. site/authoring/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
